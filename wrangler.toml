name = "email-receiver"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "24b45709d060d957340180e995f0d373"

# Worker のリクエスト/イベントログを Cloudflare Dashboard の Observability タブに保存。
# silent drop が多い Email Worker ではログが無いと挙動が見えないため必須。
[observability]
enabled = true
head_sampling_rate = 1.0

# 受信フロー (nuxt-notify workers/email-receiver と同パターン):
#   Cloudflare Email Routing の zone catch-all (`*@ippoan.org`) → この prod Worker
#     → message.to の host (subdomain) を見て prod / staging を分岐
#         - dtako.ippoan.org           → prod    (ALC_API_BASE / DTAKO_TENANT_ID / SCRAPER_ENDPOINT)
#         - dtako-staging.ippoan.org   → staging (*_STAGING var を使う、secret は同一)
#         - その他                      → silent drop
#     → matching handler が外部 API (rust-alc-api / dtako-scraper) を叩く
#
# Email Routing の catch-all は 1 zone あたり 1 つしか張れないため、staging Worker
# (`email-receiver-staging`) は実受信せず CI deploy / wrangler dev / canary 用途のみ。
#
# shared secret (INTERNAL_SHARED_SECRET / SCRAPER_API_KEY) は prod / staging で同一
# 値を共有する (= binding は 1 つ)。auth-worker など既存 4 consumer も同方式で、
# 2026-05-24 に `mcp-internal-shared-secret-{prod,staging}` を統合した経緯あり
# (Refs auth-worker CLAUDE.md)。staging で値を分けたい場合は別途 _STAGING binding を
# 足す形に拡張する (env.ts と router.ts も同時に変える)。
#
# 将来 multi-tenant 化する場合は `src/router.ts` の pickRoute() 内で local-part / DB
# 検索を足して `tenantId` を解決する形に拡張する (handler 側のシグネチャ不変)。
#
# 認証 secret は CF Secrets Store binding 経由で配布する。
# `wrangler secret put` は使わない (= per-worker env var だと
# secrets-inventory get_drift から見えない false negative リスクがあるため)。

[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[secrets_store_secrets]]
binding = "SCRAPER_API_KEY"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "dtako-scraper-api-key"

[vars]
# prod backend / scraper / tenant
ALC_API_BASE = "https://alc-api.ippoan.org"
DTAKO_TENANT_ID = ""
SCRAPER_ENDPOINT = "https://dtako-scraper-566bls5vfq-an.a.run.app/scrape-vehicle-setting"
DTAKO_R2_PREFIX = "dtako-tickets"

# staging backend / scraper / tenant (host=dtako-staging.ippoan.org 用、secret は共有)
ALC_API_BASE_STAGING = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
# staging Supabase の test tenant UUID (Refs rust-alc-api staging/test-data.json)。
# rust-alc-api staging は揮発 DB なので毎回マイグレーション後にこの UUID で再投入される。
DTAKO_TENANT_ID_STAGING = "11111111-1111-1111-1111-111111111111"
SCRAPER_ENDPOINT_STAGING = "https://dtako-scraper-staging-566bls5vfq-an.a.run.app/scrape-vehicle-setting"

# host 分岐の subdomain (省略時 router.ts の DEFAULT_*)
PROD_HOST = "dtako.ippoan.org"
STAGING_HOST = "dtako-staging.ippoan.org"

# staging Worker (CI 都合で deploy はされるが Email Routing の catch-all は 1 つしか
# 持てないので実質受信しない。手元 wrangler dev / canary 用途のみ想定)。
[env.staging]
name = "email-receiver-staging"

# top-level [observability] は named env (= [env.staging]) に自動継承されないため
# (Cloudflare wrangler の仕様)、staging Worker でもログを Observability に出すには
# 明示再宣言が必須。これが無いと email event のログが一切見えず、routing rule の
# destination を email-receiver-staging に向けても挙動を確認できない。
[env.staging.observability]
enabled = true
head_sampling_rate = 1.0

[env.staging.vars]
ALC_API_BASE = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
# rust-alc-api staging の test tenant UUID
DTAKO_TENANT_ID = "11111111-1111-1111-1111-111111111111"
SCRAPER_ENDPOINT = "https://dtako-scraper-staging-566bls5vfq-an.a.run.app/scrape-vehicle-setting"
DTAKO_R2_PREFIX = "dtako-tickets-staging"
PROD_HOST = "dtako-staging.ippoan.org"
STAGING_HOST = "dtako-staging.ippoan.org"

[[env.staging.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.staging.secrets_store_secrets]]
binding = "SCRAPER_API_KEY"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "dtako-scraper-api-key"
