name = "email-receiver"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "24b45709d060d957340180e995f0d373"

# Worker のリクエスト/イベントログを Cloudflare Dashboard の Observability タブに保存。
# silent drop が多い Email Worker ではログが無いと挙動が見えないため必須。
[observability]
enabled = true
head_sampling_rate = 1.0

# 受信フロー:
#   Cloudflare Email Routing (catch-all or specific address) → この Worker
#   → handler dispatch (subject / from / domain で routing)
#   → matching handler が外部 API (rust-alc-api / dtako-scraper) を叩く
#
# 認証 secret は CF Secrets Store binding 経由で配布する。
# `wrangler secret put` は使わない (= per-worker env var だと
# secrets-inventory get_drift から見えない false negative リスクがあるため)。
# Refs: ippoan/nuxt-notify workers/email-receiver の運用と同じ規約。

# rust-alc-api への ingest (POST /api/dtako/tickets, PATCH /api/dtako/tickets/{id}/scraped) で使う
# internal shared secret。auth-worker / secrets-inventory と同 binding 名で揃える。
[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

# dtako-scraper の POST /scrape-vehicle-setting で使う shared secret。
[[secrets_store_secrets]]
binding = "SCRAPER_API_KEY"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "dtako-scraper-api-key"

[vars]
# rust-alc-api のベース URL。dtako handler が
#   ${ALC_API_BASE}/api/dtako/tickets
#   ${ALC_API_BASE}/api/dtako/tickets/{id}/scraped
# を組み立てて叩く。
ALC_API_BASE = "https://alc-api.ippoan.org"
# 起票時の tenant 解決用 (v1 は単一 tenant 想定で env 固定)。
DTAKO_TENANT_ID = ""
# dtako-scraper Cloud Run URL。
SCRAPER_ENDPOINT = "https://dtako-scraper-566bls5vfq-an.a.run.app/scrape-vehicle-setting"
# 取得した設定 ZIP を保管する R2 prefix (将来 R2 binding 追加時に使用)。
DTAKO_R2_PREFIX = "dtako-tickets"

# staging 環境 (canary / dev 用)。Email Routing の catch-all は 1 つしか持てないので
# 実受信は production worker のみ。本 staging は wrangler dev / canary 確認専用。
[env.staging]
name = "email-receiver-staging"

[env.staging.vars]
ALC_API_BASE = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
DTAKO_TENANT_ID = ""
SCRAPER_ENDPOINT = "https://dtako-scraper-staging-566bls5vfq-an.a.run.app/scrape-vehicle-setting"
DTAKO_R2_PREFIX = "dtako-tickets-staging"

[[env.staging.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.staging.secrets_store_secrets]]
binding = "SCRAPER_API_KEY"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "dtako-scraper-api-key"
