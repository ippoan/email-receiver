name: ci

on:
  pull_request: {}
  push:
    branches: [main]
    tags: ['v*']

# Required by frontend-ci.yml の disable-auto-merge + auto-merge dual-step pattern:
#   - contents: write       → auto-merge job (queues gh pr merge --squash)
#   - pull-requests: write  → disable-auto-merge + auto-merge jobs
#   - packages: read        → @ippoan/* GitHub Packages dep install
#   - id-token: write       → frontend-ci.yml の secret-verify nested job が parse
#                              時に要求する (今回 secret-verify は使わないが、reusable
#                              の parse-time permission check で startup_failure に
#                              なるため必須)。Refs ippoan/ci-workflows CLAUDE.md
permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'worker'
      install_command: 'npm install'
      typecheck_command: 'npm run typecheck'
      # PR / main push → staging deploy (Email Routing は zone catch-all 1 個制約
      #   のため実受信は prod Worker のみだが、`wrangler dev` / canary 用途で deploy する)
      deploy_staging_script: 'npx wrangler deploy --env staging'
      # `v*` tag push → prod deploy (host で prod/staging を分岐する catch-all 受け本体)
      deploy_release_script: 'npx wrangler deploy'
      # email-receiver は Email Routing catch-all の単一受け本体で、no-traffic flip /
      # Release Wave 対象ではない。frontend-ci の release_no_traffic は default true で
      # release の `wrangler deploy` を `wrangler versions upload` に置換するが、それは
      # **既存 Worker 前提**で初回 prod deploy をブートストラップできず 10007
      # ("This Worker does not exist") で落ちる (staging は plain `wrangler deploy` なので
      # 作成できていた)。false にして release も即 100% の plain deploy にする。
      release_no_traffic: false
    secrets: inherit
