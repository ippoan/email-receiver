name: ci

on:
  pull_request: {}
  push:
    branches: [main]
    tags: ['v*']

# Required by frontend-ci.yml の disable-auto-merge + auto-merge dual-step pattern:
#   - contents: write       → auto-merge job (queues gh pr merge --squash)
#   - pull-requests: write  → disable-auto-merge + auto-merge jobs
#   - packages: read        → @ippoan/* GitHub Packages dep install
permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'worker'
      install_command: 'npm install'
      typecheck_command: 'npm run typecheck'
      # PR / main push → staging deploy (Email Routing は zone catch-all 1 個制約
      #   のため実受信は prod Worker のみだが、`wrangler dev` / canary 用途で deploy する)
      deploy_staging_script: 'npx wrangler deploy --env staging'
      # `v*` tag push → prod deploy (host で prod/staging を分岐する catch-all 受け本体)
      deploy_release_script: 'npx wrangler deploy'
    secrets: inherit
