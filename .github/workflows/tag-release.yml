name: Tag Release

# stable `v{major}.{minor}.{patch}` tag を workflow_dispatch で採番 + push し、
# 同 job 内で GitHub Release (releases/latest) を作成する (ci-workflows
# tag-release.yml Mode B)。
#
# tag は TAG_RELEASE_PAT (org secret、secrets: inherit) で push するため、
# 下流の tag-trigger workflow が発火する:
#   - publish.yml  (on: push tags v*) → @ippoan/email-receiver を latest publish
#   - test.yml     (on: push tags v*) → frontend-ci の deploy_release で
#                  本番 Worker (email-receiver) を wrangler deploy
# (GITHUB_TOKEN で push した tag は下流を発火しないため PAT 必須。dev-release.yml
#  が publish を同 run 内に co-locate しているのと対照的に、stable は分離 workflow。)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    uses: ippoan/ci-workflows/.github/workflows/tag-release.yml@main
    with:
      bump: ${{ inputs.bump }}
      create_release: true
    secrets: inherit
